# API cost configuration for the job-report pipeline.
# Edit this file to control which models are used and how many API calls are made.
#
# Stage 2: Criteria generation  — one-off call; only runs when scoring-criteria.yaml is absent.
# Stage 5: Semantic scoring     — local model, no API cost.
# Stage 6: LLM evaluation       — one call per listing forwarded from the rule scorer.
# Stage 7: Report generation    — one call per listing that scores >= report_generation.min_score.
#
# provider: default LLM provider for all stages. Valid values: openai, anthropic
# Per-stage `provider:` key overrides the top-level default for that stage only.
# Required env vars: OPENAI_API_KEY (openai) | ANTHROPIC_API_KEY (anthropic)
provider: openai

# Model reference
# ┌─────────────────────┬────────────────────────────────┬─────────────────────────────────┐
# │ Tier                │ OpenAI                         │ Anthropic                       │
# ├─────────────────────┼────────────────────────────────┼─────────────────────────────────┤
# │ Fast / cheap        │ gpt-4.1-nano                   │ claude-haiku-4-5-20251001        │
# │ Balanced            │ gpt-4.1-mini                   │ claude-sonnet-4-6               │
# │ Best quality        │ gpt-4.1                        │ claude-opus-4-7                 │
# └─────────────────────┴────────────────────────────────┴─────────────────────────────────┘

# Stage 2 — generate scoring-criteria.yaml from your CV + profile.
# One-off call; quality matters more than cost here.
# Anthropic equivalent: claude-sonnet-4-6
criteria_generation:
  model: gpt-4.1-mini
  max_tokens: 2048

# Stage 6 — quick fit evaluation of the top-N rule-scored listings.
# High volume — use the cheapest model that produces reliable JSON scores.
# Anthropic equivalent: claude-haiku-4-5-20251001
llm_evaluation:
  model: gpt-4.1-nano
  max_tokens: 512
  concurrency: 5   # parallel API calls; raise for faster runs, lower to avoid rate limits
  top_n: 20        # listings forwarded to this stage — the primary cost lever

# Stage 7 — detailed per-listing markdown reports.
# Small set; richer output justifies a stronger model.
# Anthropic equivalent: claude-sonnet-4-6  (or claude-opus-4-7 for best quality)
report_generation:
  model: gpt-4.1-mini
  max_tokens: 1500
  min_score: 7     # minimum fit_score (0–10) required to generate a report
  top_n: 5         # cap on reports generated; null = no cap (all qualifying listings)

# Stage 5 — local semantic scoring (downloads ~80 MB on first run, no ongoing API cost).
semantic:
  model: all-MiniLM-L6-v2

# apply — generates tailored CV + cover letter HTML for one listing.
# One call per run; higher token budget needed for full structured CV output.
# Anthropic equivalent: claude-sonnet-4-6
apply_generation:
  model: gpt-4.1-mini
  max_tokens: 3500
